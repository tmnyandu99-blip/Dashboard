<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firm Compliance Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Firm Compliance Portal</h1>

<div class="form-card">
    <h2>Add Compliance Item</h2>
    <input type="text" id="client" placeholder="Client Name">
    <select id="type">
        <option value="SARS">SARS</option>
        <option value="CIPC">CIPC</option>
    </select>
    <input type="text" id="compliance" placeholder="Compliance Type">
    <input type="date" id="dueDate">
    <input type="text" id="assigned" placeholder="Assigned To">
    <button onclick="addNewItem()">Add</button>
</div>
    
<div class="dashboard">
    <div class="card" id="overdue">
        <h2>🚨 Overdue Compliance</h2>
        <ul></ul>
    </div>

    <div class="card" id="week">
        <h2>⏰ Due This Week</h2>
        <ul></ul>
    </div>

    <div class="card" id="month">
        <h2>📅 Due This Month</h2>
        <ul></ul>
    </div>

    <div class="card" id="sars">
        <h2>🧾 SARS Filings</h2>
        <ul></ul>
    </div>

    <div class="card" id="cipc">
        <h2>🏢 CIPC Filings</h2>
        <ul></ul>
    </div>

    <div class="card" id="staff">
        <h2>👤 Staff Workload</h2>
        <ul></ul>
    </div>

    <div class="card" id="completion">
        <h2>📊 Completion Rate</h2>
        <div id="completionRate"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
